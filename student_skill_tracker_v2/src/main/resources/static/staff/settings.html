<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Staff</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL DARK THEME --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: "Poppins", sans-serif; 
            background: linear-gradient(-45deg, #0d0d0d, #1b1b1b, #2d2d2d, #1a1a1a);
            background-size: 400% 400%;
            animation: bgAnimation 10s ease infinite;
            color: #e0e0e0; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        @keyframes bgAnimation { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; height: 100vh; 
            background: rgba(20, 20, 20, 0.8); 
            padding: 20px; border-right: 1px solid #333;
            position: fixed; top: 0; left: 0; z-index: 1000;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }
        
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }

        .logo { text-align: center; margin-bottom: 25px; font-size: 24px; font-weight: 700; color: #fff; }
        
        .menu { list-style: none; padding: 0; }
        .menu li { margin: 8px 0; }
        .menu li a {
            color: #b0b0b0; text-decoration: none; font-size: 14px; display: flex; gap: 12px;
            align-items: center; padding: 10px 15px; border-radius: 8px; transition: 0.3s;
        }
        .menu li a:hover, .menu li a.active { 
            background: rgba(255, 255, 255, 0.1); color: #fff; 
            border-left: 3px solid #2ecc71; /* Green accent */
        }

        /* --- MAIN CONTENT --- */
        .main { margin-left: 260px; width: calc(100% - 260px); padding: 40px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 600; color: #fff; }

        /* --- FORM CARDS --- */
        .settings-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: rgba(30, 30, 30, 0.6); 
            padding: 30px;
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
        }

        .card h3 { margin-bottom: 20px; color: #fff; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #aaa; margin-bottom: 8px; font-size: 13px; }
        
        input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #2ecc71; background: #2a2a2a; }
        input:disabled { background: #1a1a1a; color: #666; cursor: not-allowed; }

        button {
            background: #2ecc71; color: #000;
            padding: 12px 25px; border: none; border-radius: 6px;
            font-weight: 600; cursor: pointer;
            transition: 0.2s;
            display: flex; align-items: center; gap: 8px;
        }
        button:hover { background: #27ae60; }
        
        .btn-danger { background: #e74c3c; color: #fff; margin-top: 10px; width: 100%; justify-content: center; }
        .btn-danger:hover { background: #c0392b; }

        /* Feedback Message */
        #msg { margin-top: 15px; font-size: 14px; font-weight: 500; min-height: 20px; }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
        });

        // Load existing data
        async function loadProfile() {
            const token = localStorage.getItem("jwt_token");
            if (!token) { window.location.href = "/"; return; }

            try {
                // Fetch current user details
                const res = await fetch("/api/staff/me", {
                    headers: { "Authorization": "Bearer " + token }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('fullName').value = data.fullName || "";
                    document.getElementById('email').value = data.email || "";
                    document.getElementById('role').value = data.role || "Staff"; // Read only
                }
            } catch (err) {
                console.error("Error loading profile:", err);
            }
        }

        // Save Changes
        async function saveProfile() {
            const token = localStorage.getItem("jwt_token");
            const btn = document.getElementById('saveBtn');
            const msg = document.getElementById('msg');

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple validation
            if (!fullName || !email) {
                showMessage("Name and Email are required.", "red");
                return;
            }

            try {
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
                
                const payload = { fullName, email };
                if (password) payload.password = password; // Only send if changed

                const res = await fetch("/api/staff/settings", {
                    method: "PUT",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token 
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    showMessage("Profile updated successfully!", "#2ecc71");
                    document.getElementById('password').value = ""; // Clear password field
                } else {
                    showMessage("Failed to update profile.", "red");
                }
            } catch (err) {
                showMessage("Server error. Please try again.", "red");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-save"></i> Save Changes';
            }
        }

        function showMessage(text, color) {
            const msg = document.getElementById('msg');
            msg.style.color = color;
            msg.innerText = text;
            setTimeout(() => { msg.innerText = ""; }, 3000);
        }

        function logout() { if(confirm("Logout?")) { localStorage.clear(); window.location.href = "/"; } }
    </script>
</head>

<body>

<aside class="sidebar">
    <h2 class="logo"><i class="fa-solid fa-user-tie"></i> Faculty</h2>
    <ul class="menu">
        <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
        <li><a href="students-overview.html"><i class="fa fa-users"></i> Student Overview</a></li>
        <li><a href="leetcode-tracker.html"><i class="fa-brands fa-codepen"></i> LeetCode Tracker</a></li>
        <li><a href="github-analytics.html"><i class="fa-brands fa-github"></i> GitHub Analytics</a></li>
        <li><a href="hackerrank-skills.html"><i class="fa-brands fa-hackerrank"></i> HackerRank Skills</a></li>
		<li><a href="gfg-tracker.html"><i class="fa-solid fa-code"></i> GFG Tracker</a></li>

        <li><a href="coding-logs.html"><i class="fa-solid fa-fire"></i> Daily Coding Logs</a></li>
        <li><a href="certificate-verification.html"><i class="fa-solid fa-certificate"></i> Verify Certs</a></li>
        <li><a href="resume-review.html"><i class="fa-solid fa-file-pdf"></i> Resume Review</a></li>
        <li><a href="reports.html"><i class="fa-solid fa-chart-pie"></i> Reports & Insights</a></li>
        
        <li><a href="settings.html" class="active"><i class="fa-solid fa-gear"></i> Settings</a></li>
        
        <li><a href="#" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
    </ul>
</aside>

<main class="main">
    <div class="header">
        <h1>Account Settings</h1>
        <span style="background:rgba(255, 255, 255, 0.1); color:#fff; padding:6px 15px; border-radius:20px; font-size:13px; border:1px solid #444;">
            <i class="fa-solid fa-shield-halved"></i> Secure
        </span>
    </div>

    <div class="settings-container">
        
        <div class="card">
            <h3><i class="fa-regular fa-id-card"></i> Profile Information</h3>
            
            <div class="form-group">
                <label>Role / Designation</label>
                <input id="role" type="text" value="Staff" disabled style="opacity:0.6;">
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input id="fullName" type="text" placeholder="Enter full name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input id="email" type="email" placeholder="name@college.edu">
            </div>
        </div>

        <div class="card">
            <h3><i class="fa-solid fa-lock"></i> Security & Actions</h3>
            
            <div class="form-group">
                <label>New Password (Optional)</label>
                <input id="password" type="password" placeholder="Leave blank to keep current">
            </div>

            <button id="saveBtn" onclick="saveProfile()" style="width:100%; justify-content:center; margin-bottom: 20px;">
                <i class="fa-solid fa-save"></i> Save Changes
            </button>
            
            <p id="msg" style="text-align: center; height: 20px;"></p>

            <div style="border-top: 1px solid rgba(255,255,255,0.1); margin-top:20px; padding-top:20px;">
                <button onclick="logout()" class="btn-danger">
                    <i class="fa-solid fa-right-from-bracket"></i> Sign Out
                </button>
            </div>
        </div>

    </div>
</main>

</body>
</html>
