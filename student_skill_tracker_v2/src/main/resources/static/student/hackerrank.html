<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackerRank Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ANIMATED BACKGROUND ADDED HERE */
        body { 
            font-family: "Poppins", sans-serif; 
            background: linear-gradient(-45deg, #0d0d0d, #1b1b1b, #2d2d2d, #1a1a1a);
            background-size: 400% 400%;
            animation: bgAnimation 15s ease infinite;
            color: #e0e0e0; 
            display: flex; 
            min-height: 100vh; 
        }

        @keyframes bgAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* SIDEBAR */
        .sidebar { width: 260px; height: 100vh; background: rgba(20, 20, 20, 0.8); padding: 20px; border-right: 1px solid #333; position: fixed; top: 0; left: 0; z-index: 1000; }
        .logo { text-align: center; margin-bottom: 20px; font-size: 28px; font-weight: 700; color: #fff; }
        .menu { list-style: none; padding: 0; }
        .menu li { margin: 12px 0; }
        .menu li a { color: #b0b0b0; text-decoration: none; font-size: 16px; display: flex; gap: 12px; align-items: center; padding: 10px 15px; border-radius: 8px; transition: 0.3s; cursor: pointer; }
        .menu li a:hover, .menu li a.active { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* MAIN */
        .main { margin-left: 260px; width: calc(100% - 260px); padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { color: #fff; }
        .user-tag { background: rgba(46, 204, 113, 0.15); color: #2ecc71; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: 600; }

        /* CARDS */
        .card { background: rgba(30, 30, 30, 0.6); padding: 25px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; backdrop-filter: blur(5px); }
        
        /* TOP STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { text-align: center; }
        .stat-box h3 { font-size: 14px; color: #aaa; margin-bottom: 5px; }
        .stat-box p { font-size: 36px; font-weight: 700; margin: 0; color: #fff; }
        
        /* CONTENT GRID */
        .content-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        /* SKILL BARS */
        .skill-item { margin-bottom: 20px; }
        .skill-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #ccc; }
        .progress-bg { width: 100%; height: 8px; background: #333; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 1s ease-in-out; }

        /* BADGE CARDS */
        .badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .badge-card { background: #252525; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #444; transition: 0.3s; }
        .badge-card:hover { transform: translateY(-5px); border-color: #2ecc71; }
        .badge-card i { font-size: 24px; margin-bottom: 10px; display: block; }
        .badge-card span { font-size: 13px; font-weight: 600; color: #ddd; }
    </style>

	<script>
	        document.addEventListener('DOMContentLoaded', () => {
	            fetchHackerRankData();
	            setActiveNav();
	        });

	        function fetchHackerRankData() {
	            const token = localStorage.getItem("jwt_token");
	            if (!token) { window.location.href = "/"; return; }

	            document.getElementById("loading").style.display = "block";

	            // *** CRITICAL FIX: URL IS CORRECTED TO THE STABLE BACKEND PATH ***
	            fetch("/api/data/hackerrank/stats", {
	                method: "GET",
	                headers: { "Authorization": "Bearer " + token }
	            })
	            .then(res => {
	                document.getElementById("loading").style.display = "none";
	                if (!res.ok) {
	                    // Log error status if something is wrong (like 403 or 404)
	                    console.error("Failed to fetch data. Status: " + res.status);
	                    // Throw to jump to the catch block
	                    throw new Error(`HTTP error! Status: ${res.status}`);
	                }
	                return res.json();
	            })
	            .then(data => {
	                // Top Stats
	                document.getElementById('hrUser').innerText = "@" + data.username;
	                document.getElementById('badgeCount').innerText = data.badges;
	                document.getElementById('solvedCount').innerText = data.solved;
	                document.getElementById('certCount').innerText = data.certificates;

	                // 1. FILL SKILL BARS
	                const skillContainer = document.getElementById('skillContainer');
	                skillContainer.innerHTML = "";
	                if(data.skills && data.skills.length > 0) {
	                    data.skills.forEach(s => {
	                        skillContainer.innerHTML += `
	                            <div class="skill-item">
	                                <div class="skill-info">
	                                    <span>${s.name}</span>
	                                    <span>${s.percent}% Mastery</span>
	                                </div>
	                                <div class="progress-bg">
	                                    <div class="progress-fill" style="width: ${s.percent}%; background: ${s.color};"></div>
	                                </div>
	                            </div>
	                        `;
	                    });
	                } else {
	                    skillContainer.innerHTML = "<p style='color:#777'>No skills found. Solve challenges to earn stars!</p>";
	                }

	                // 2. FILL BADGE GRID
	                const badgeContainer = document.getElementById('badgeGrid');
	                badgeContainer.innerHTML = "";
	                if(data.skills.length > 0) {
	                    data.skills.forEach(s => {
	                        let icon = "fa-code";
	                        if(s.name.toLowerCase().includes("java")) icon = "fa-brands fa-java";
	                        if(s.name.toLowerCase().includes("python")) icon = "fa-brands fa-python";
	                        
	                        badgeContainer.innerHTML += `
	                            <div class="badge-card">
	                                <i class="${icon}" style="color:${s.color}"></i>
	                                <span>${s.name}</span>
	                            </div>
	                        `;
	                    });
	                }
	            })
	            .catch(err => {
	                document.getElementById('hrUser').innerText = "Load Error";
	                console.error("Error fetching HackerRank data:", err);
	                // Optionally display a user-friendly error message
	                document.getElementById('skillContainer').innerHTML = "<p style='color:#e74c3c;'>Error loading data. Please check your link or try refreshing.</p>";
	            });
	        }

	        function logout() { if(confirm("Logout?")) { localStorage.clear(); window.location.href = "/"; } }
	        function setActiveNav() { document.querySelectorAll('.sidebar a').forEach(a => { if (a.getAttribute('href') === 'hackerrank.html') a.classList.add('active'); }); }
	    </script>
</head>

<body>

<aside class="sidebar">
    <h2 class="logo">Student</h2>
    <ul class="menu">
        <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
        <li><a href="leetcode.html"><i class="fa-brands fa-codepen"></i> LeetCode</a></li>
        <li><a href="github.html"><i class="fa-brands fa-github"></i> GitHub</a></li>
        <li><a href="hackerrank.html"><i class="fa-brands fa-hackerrank"></i> HackerRank</a></li>
		<li><a href="gfg.html" id="nav-gfg"><i class="fa-solid fa-code"></i> GeeksforGeeks</a></li>
        <li><a href="linkedin.html"><i class="fa-brands fa-linkedin"></i> LinkedIn</a></li>
        <li><a href="daily-coding.html"><i class="fa-solid fa-book"></i> Daily Coding</a></li>
        <li><a href="certificates.html"><i class="fa-solid fa-award"></i> Certificates</a></li>
        <li><a href="resume.html"><i class="fa-solid fa-file"></i> Resume</a></li>
        <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
        <li><a onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
    </ul>
</aside>

<main class="main">
    <div class="header">
        <h1>HackerRank Insights <i class="fa-brands fa-hackerrank" style="color:#2ecc71;"></i></h1>
        <span id="hrUser" class="user-tag">Loading...</span>
    </div>

    <section class="stats-grid">
        <div class="card stat-box">
            <h3><i class="fa-solid fa-medal" style="color:#f1c40f;"></i> Badges</h3>
            <p id="badgeCount">0</p>
        </div>
        <div class="card stat-box">
            <h3><i class="fa-solid fa-check-double" style="color:#3498db;"></i> Est. Solved</h3>
            <p id="solvedCount">0</p>
        </div>
        <div class="card stat-box">
            <h3><i class="fa-solid fa-certificate" style="color:#9b59b6;"></i> Certificates</h3>
            <p id="certCount">0</p>
        </div>
    </section>

    <div id="loading" style="text-align:center; margin-bottom:20px; color:#aaa;">
        <i class="fa-solid fa-spinner fa-spin"></i> Fetching live data...
    </div>

    <div class="content-row">
        
        <section class="card">
            <h2 style="font-size:18px; margin-bottom:20px; color:#fff;">
                <i class="fa-solid fa-chart-bar" style="color:#2ecc71;"></i> Language Proficiency
            </h2>
            <div id="skillContainer"></div>
        </section>

        <section class="card">
            <h2 style="font-size:18px; margin-bottom:20px; color:#fff;">
                <i class="fa-solid fa-shield-halved" style="color:#f1c40f;"></i> Earned Badges
            </h2>
            <div id="badgeGrid" class="badge-grid"></div>
        </section>

    </div>
</main>

</body>
</html>
