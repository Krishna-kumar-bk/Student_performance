<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Coding | Student Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* (KEEP ALL YOUR EXISTING STYLES HERE - they are fine) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: "Poppins", sans-serif; 
            background: linear-gradient(-45deg, #121212, #1f1f1f, #2b2b2b, #121212);
            background-size: 400% 400%;
            animation: bgAnimation 15s ease infinite;
            color: #fff; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        @keyframes bgAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sidebar {
            width: 260px; height: 100vh; background: rgba(20, 20, 20, 0.8);
            padding: 20px; border-right: 1px solid #333;
            position: fixed; top: 0; left: 0; z-index: 1000;
        }
        .logo { text-align: center; margin-bottom: 20px; font-size: 28px; font-weight: 700; color: #fff; }
        .menu { list-style: none; padding: 0; }
        .menu li { margin: 12px 0; }
        .menu li a {
            color: #b0b0b0; text-decoration: none; font-size: 16px; display: flex; gap: 12px;
            align-items: center; padding: 10px 15px; border-radius: 8px; transition: 0.3s; cursor: pointer;
        }
        .menu li a:hover, .menu li a.active { background: rgba(255, 255, 255, 0.1); color: #fff; }

        .main { margin-left: 260px; width: calc(100% - 260px); padding: 40px; }
        .header { display: flex; justify-content: flex-start; align-items: center; margin-bottom: 30px; }

        .card {
            background: rgba(30, 30, 30, 0.6); padding: 25px;
            border-radius: 12px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .coding-stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px;
        }
        .coding-stats-grid h3 { margin-top: 0; font-size: 14px; color: #aaa; }
        .coding-stats-grid p { font-size: 42px; font-weight: 700; margin: 0; color: #1abc9c; }

        .input-section { margin-bottom: 40px; }
        input[type="number"] {
            padding: 12px; margin-right: 10px; border: 1px solid #444;
            border-radius: 6px; background: #222;
            color: #fff; width: 200px;
        }
        button {
            padding: 12px 25px; background: #2ecc71; color: #fff; border: none;
            border-radius: 6px; cursor: pointer; transition: background 0.2s;
            display: inline-flex; align-items: center; gap: 8px; font-weight: 600;
        }
        button:hover { background: #27ae60; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #1abc9c; font-size: 16px; }
        td { color: #ddd; }
        tr:hover { background: rgba(255,255,255,0.05); }

    </style>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            setActiveNav();
        });

        function loadStats() {
            const token = localStorage.getItem("jwt_token");
            if(!token) { window.location.href = "/"; return; }

            // *** CRITICAL FIX: The GET endpoint must be /api/student/daily-coding ***
            fetch("/api/student/daily-coding", {
                method: "GET",
                headers: { "Authorization": "Bearer " + token }
            })
            .then(res => {
                if (!res.ok) {
                    console.error("API call failed: Status " + res.status);
                    // Return empty data structure on error
                    return { todayCount: 0, weekCount: 0, monthCount: 0, history: [] }; 
                }
                return res.json();
            })
            .then(data => {
                document.getElementById('todayCount').innerText = data.todayCount || 0;
                document.getElementById('weekCount').innerText = data.weekCount || 0;
                document.getElementById('monthCount').innerText = data.monthCount || 0;

                // Load History Table
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = "";
                if(data.history && data.history.length > 0) {
                    data.history.forEach(log => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${log.logDate}</td>
                                <td>${log.solvedCount}</td>
                                <td><span style="color:#2ecc71; font-size:12px;">Logged</span></td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = "<tr><td colspan='3'>No logs found. Start coding!</td></tr>";
                }
            })
            .catch(err => {
                console.error("Error loading stats:", err);
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = "<tr><td colspan='3' style='color:red;'>Error loading logs. Please check console.</td></tr>";
            });
        }

        function addSession() {
            const token = localStorage.getItem("jwt_token");
            const countInput = document.getElementById("count");
            const msgElement = document.getElementById("msg");
            
            if (!countInput.value || parseInt(countInput.value) <= 0) {
                alert("Please enter a valid number");
                return;
            }

            // *** CRITICAL FIX: The POST endpoint must also be /api/student/daily-coding ***
            fetch("/api/student/daily-coding", {
                method: "POST",
                headers: { 
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ solved: parseInt(countInput.value) })
            })
            .then(res => {
                if(res.ok) {
                    msgElement.innerText = "Added successfully! ✅";
                    msgElement.style.color = "#2ecc71";
                    loadStats(); // Refresh data
                    countInput.value = "";
                } else {
                    alert("Failed to save. Check server logs.");
                    msgElement.innerText = "Failed to save. ❌";
                    msgElement.style.color = "#e74c3c";
                }
            });
        }

        function logout() {
            if(confirm("Logout?")) {
                localStorage.clear();
                window.location.href = "/";
            }
        }
        function setActiveNav() {
            document.querySelectorAll('.sidebar a').forEach(a => {
                if (a.getAttribute('href') === 'daily-coding.html') {
                    a.classList.add('active');
                }
            });
        }
    </script>
</head>

<body>

<aside class="sidebar">
    <h2 class="logo">Student</h2>
    <ul class="menu">
        <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
        <li><a href="leetcode.html"><i class="fa-brands fa-codepen"></i> LeetCode</a></li>
        <li><a href="github.html"><i class="fa-brands fa-github"></i> GitHub</a></li>
        <li><a href="hackerrank.html"><i class="fa-brands fa-hackerrank"></i> HackerRank</a></li>
		<li><a href="gfg.html" id="nav-gfg"><i class="fa-solid fa-code"></i> GeeksforGeeks</a></li>
        <li><a href="linkedin.html"><i class="fa-brands fa-linkedin"></i> LinkedIn</a></li>
        <li><a href="daily-coding.html"><i class="fa-solid fa-book"></i> Daily Coding</a></li>
        <li><a href="certificates.html"><i class="fa-solid fa-award"></i> Certificates</a></li>
        <li><a href="resume.html"><i class="fa-solid fa-file"></i> Resume</a></li>
        <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
        <li><a onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li> 
    </ul>
</aside>

<main class="main">
    <div class="header">
        <h1>Daily Coding Progress <i class="fa-solid fa-calendar-check" style="color:#2ecc71;"></i></h1>
    </div>

    <section class="coding-stats-grid">
        <div class="card" style="text-align:center;">
            <h3>Today</h3>
            <p id="todayCount">0</p>
        </div>
        <div class="card" style="text-align:center;">
            <h3>This Week</h3>
            <p id="weekCount">0</p>
        </div>
        <div class="card" style="text-align:center;">
            <h3>This Month</h3>
            <p id="monthCount">0</p>
        </div>
    </section>

    <section class="card input-section">
        <h3 style="margin-bottom:15px;">Log Your Progress</h3>
        <div style="display:flex; align-items:center;">
            <input id="count" type="number" placeholder="Problems solved today" min="1">
            <button onclick="addSession()"><i class="fa fa-plus"></i> Add Session</button>
        </div>
        <p id="msg" style="margin-top:10px; font-weight:bold;"></p>
    </section>

    <section class="card">
        <h3 style="margin-bottom:15px; border-bottom:1px solid #444; padding-bottom:10px;">History Log</h3>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Problems Solved</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="3">Loading...</td></tr>
            </tbody>
        </table>
    </section>
</main>

</body>
</html>
