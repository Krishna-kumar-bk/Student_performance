

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Only</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(-45deg, #0d0d0d, #1b1b1b, #2d2d2d, #1a1a1a);
            background-size: 400% 400%;
            animation: bgAnimation 10s ease infinite;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes bgAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Sidebar Only */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: rgba(20, 20, 20, 0.7);
            padding: 20px;
            backdrop-filter: blur(10px);
            border-right: 1px solid #333;
            position: fixed;
            top: 0;
            left: 0;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: 700;
        }

        .menu {
            list-style: none;
        }

        .menu li {
            margin: 12px 0;
        }

        .menu li a {
            color: #ddd;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 8px 10px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .menu li a:hover,
        .menu li a.active {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }
    </style>
</head>

<body>

	<aside class="sidebar">
	    <h2 class="logo">Student</h2>

	    <ul class="menu">
	        <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
	        <li><a href="leetcode.html"><i class="fa-brands fa-codepen"></i> LeetCode</a></li>
	        <li><a href="github.html"><i class="fa-brands fa-github"></i> GitHub</a></li>
	        <li><a href="hackerrank.html"><i class="fa-brands fa-hackerrank"></i> HackerRank</a></li>
	        
	        <li><a href="gfg.html"><i class="fa-solid fa-code"></i> GeeksforGeeks</a></li>
	        
	        <li><a href="linkedin.html"><i class="fa-brands fa-linkedin"></i> LinkedIn</a></li>
	        <li><a href="daily-coding.html"><i class="fa-solid fa-book"></i> Daily Coding</a></li>
	        <li><a href="certificates.html"><i class="fa-solid fa-award"></i> Certificates</a></li>
	        <li><a href="resume.html"><i class="fa-solid fa-file"></i> Resume</a></li>
	        <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
	        <li><a href="../index.html" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
	    </ul>
	</aside>

</body>
</html>
